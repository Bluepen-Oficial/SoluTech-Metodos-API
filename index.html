<!DOCTYPE html>
<html lang="br-pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos API</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/10169/10169724.png" type="image/x-icon">
</head>

<body>
    <div id="conteiner">
        <h1>Métodos API</h1>
        <div id="postID">
            <h3>Buscar Post por ID</h3>
            <label for="inputID">Informe o ID do post:</label>
            <input type="number" placeholder="Informe o ID..." id="receberID">
            <button id="btnBuscarPost">Buscar Post</button>
            <p id="resultadoBuscaPost"></p>
        </div>
        <div id="todosPosts">
            <Label>Buscar Todos os Posts</Label>
            <button id="btnBuscarTodos">Buscar Posts</button>
            <div>
                <p id="resultadoTodosPost"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
